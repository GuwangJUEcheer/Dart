spring.application.name=brackeet

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath:mapper/*.xml

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# File upload (product images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Admin access whitelist (comma-separated IPs)
admin.allowed-ips=${ADMIN_ALLOWED_IPS:}

# Gmail OAuth2
gmail.client-id=${GMAIL_CLIENT_ID}
gmail.client-secret=${GMAIL_CLIENT_SECRET}
gmail.sender-email=${GMAIL_SENDER_EMAIL}
gmail.refresh-token=${GMAIL_REFRESH_TOKEN}

# Merchant notification email
merchant.email=${MERCHANT_EMAIL}
